<!DOCTYPE html>
<html>
<head>
    <title>Internship Confirmation Form</title>
</head>
<body>

<h2>Internship Confirmation Form</h2>

<form>

<table>

<tr>
    <td>Student Name</td>
    <td><input type="text" required></td>
</tr>

<tr>
    <td>Email Address</td>
    <td><input type="email" required></td>
</tr>

<tr>
    <td>Preferred Internship Type</td>
    <td>
        <input type="radio" name="type"> On-Site
        <input type="radio" name="type"> Remote
    </td>
</tr>

<tr>
    <td>Internship Duration</td>
    <td>
        <select>
            <option>6 Weeks</option>
            <option>3 Months</option>
        </select>
    </td>
</tr>

<tr>
    <td>Skills of Interest</td>
    <td>
        <input type="checkbox"> Web Development <br>
        <input type="checkbox"> Data Analysis <br>
        <input type="checkbox"> Mobile Apps
    </td>
</tr>

<tr>
    <td colspan="2">
        <input type="submit" value="Submit">
    </td>
</tr>

</table>

</form>

</body>
</html>
